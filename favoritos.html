<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="./build/main.css">
    <title>Favoritos</title>
</head>
<body>
    <header>
        <div class="cabecalho-menu-vertical text-dark d-flex justify-content-between align-items-center p-3 bg-light">
            <i class="fa-solid fa-chevron-left botao-voltar"></i>
            <h2 class="mb-0">Favoritos</h2>
        </div>
    </header>
    <div class="faixa-alerta">
            <div class="texto-infinito">
                <span>PROMOÇÃO DE INVERNO - 30% OFF • ECHO MODA • FRETE GRÁTIS ACIMA DE R$ 200 • </span>
                <span>PROMOÇÃO DE INVERNO - 30% OFF • ECHO MODA • FRETE GRÁTIS ACIMA DE R$ 200 • </span>
            </div>
    </div>
    <main class="container mt-5">
        <div class="row pt-3">
            <!-- Produto de Exemplo 1 -->
            <div class="col-6 col-md-4 col-lg-3 mb-4">
                <div class="produto-favorito">
                    <img src="/source/imagens/pexels-geyonk-1152077.jpg" class="w-100" alt="Bolsa de couro">
                    <h6 class="text-center mt-2">Bolsa de couro</h6>
                    <strong><p class="text-center">R$ 226,00</p></strong>
                    <button class="btn btn-dark btn-sm w-100">Ver produto</button>
                    <button class="btn btn-outline-danger btn-sm w-100 mt-2">Remover</button>
                </div>
            </div>
            <!-- Produto de Exemplo 2 -->
            <div class="col-6 col-md-4 col-lg-3 mb-4">
                <div class="produto-favorito">
                    <img src="/source/imagens/pexels-ron-lach-10341097.jpg" class="w-100" alt="Bota de couro">
                    <h6 class="text-center mt-2">Bota de couro</h6>
                    <strong><p class="text-center">R$ 319,20</p></strong>
                    <button class="btn btn-dark btn-sm w-100">Ver produto</button>
                    <button class="btn btn-outline-danger btn-sm w-100 mt-2">Remover</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
